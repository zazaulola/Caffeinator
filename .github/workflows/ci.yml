name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & bundle
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Build & bundle (universal)
        run: make bundle

      - name: Verify bundle
        run: |
          APP=.build/Caffeinator.app
          BIN="$APP/Contents/MacOS/Caffeinator"
          test -x "$BIN" || { echo "executable missing"; exit 1; }
          plutil -lint "$APP/Contents/Info.plist"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "archs: $(lipo -archs "$BIN")"
          lipo -archs "$BIN" | grep -q arm64  || { echo "missing arm64";  exit 1; }
          lipo -archs "$BIN" | grep -q x86_64 || { echo "missing x86_64"; exit 1; }

      - name: Upload app bundle
        uses: actions/upload-artifact@v7
        with:
          name: Caffeinator.app
          path: .build/Caffeinator.app
          if-no-files-found: error
