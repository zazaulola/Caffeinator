name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & bundle
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build (release)
        run: swift build -c release

      - name: Assemble .app bundle
        run: make bundle

      - name: Verify bundle
        run: |
          APP=.build/Caffeinator.app
          test -x "$APP/Contents/MacOS/Caffeinator" || { echo "executable missing"; exit 1; }
          plutil -lint "$APP/Contents/Info.plist"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Caffeinator.app
          path: .build/Caffeinator.app
          if-no-files-found: error
